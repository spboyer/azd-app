name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'cli/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: cli

env:
  GO_VERSION: '1.26.1'

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '${{ env.GO_VERSION }}'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Cache Go tools
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@5b4374b04084dc1f9032b52464284b769ac5059e # v4
        with:
          version: 9

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install Azure Developer CLI (azd)
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Run preflight checks
        run: mage preflight
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '${{ env.GO_VERSION }}'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@5b4374b04084dc1f9032b52464284b769ac5059e # v4
        with:
          version: 9

      - name: Build dashboard
        run: |
          cd dashboard
          pnpm install
          pnpm run build
          cd ..

      - name: Install Aspire CLI
        shell: pwsh
        run: |
          $version = "9.5.2"
          if (dotnet tool list --global | Select-String -Pattern "^aspire.cli\s") {
            dotnet tool update --global aspire.cli --version $version
          }
          else {
            dotnet tool install --global aspire.cli --version $version
          }
          if ($IsWindows) {
            $toolPath = "$env:USERPROFILE\.dotnet\tools"
          }
          else {
            $toolPath = "$env:HOME/.dotnet/tools"
          }
          if (-not (Test-Path $toolPath)) {
            throw "Dotnet tool path not found: $toolPath"
          }
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run tests
        shell: bash
        run: |
          mkdir -p ../coverage
          # Exclude tests/test-tool (it's a standalone main package with no tests)
          PACKAGES=$(go list ./... | grep -v '/tests/test-tool')
          # Race detector not supported on macOS without additional setup
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            go test -short -v -coverprofile=../coverage/coverage.out $PACKAGES
          else
            go test -short -v -race -coverprofile=../coverage/coverage.out $PACKAGES
          fi

      - name: Upload coverage to Codecov
        if: github.repository == 'jongio/azd-app'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          file: coverage/coverage.out
          flags: unittests
          name: codecov-${{ matrix.os }}-go-${{ env.GO_VERSION }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        run: |
          go tool cover -func=../coverage/coverage.out -o=../coverage/coverage.txt
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ../coverage/coverage.txt | tail -n 20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Calculate total coverage
          COVERAGE=$(go tool cover -func=../coverage/coverage.out | grep total | awk '{print $3}')
          echo "**Total Coverage: $COVERAGE**" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '${{ env.GO_VERSION }}'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@5b4374b04084dc1f9032b52464284b769ac5059e # v4
        with:
          version: 9

      - name: Build dashboard assets
        run: |
          cd dashboard
          pnpm install
          pnpm run build
          cd ..

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [preflight, test, lint]
    timeout-minutes: 30
    
    defaults:
      run:
        working-directory: cli
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '${{ env.GO_VERSION }}'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@5b4374b04084dc1f9032b52464284b769ac5059e # v4
        with:
          version: 9

      - name: Build dashboard
        run: |
          cd dashboard
          pnpm install
          pnpm run build
          cd ..

      - name: Build for multiple platforms
        run: |
          GOOS=windows GOARCH=amd64 go build -o bin/windows-amd64/app.exe ./src/cmd/app
          GOOS=linux GOARCH=amd64 go build -o bin/linux-amd64/app ./src/cmd/app
          GOOS=darwin GOARCH=amd64 go build -o bin/darwin-amd64/app ./src/cmd/app
          GOOS=darwin GOARCH=arm64 go build -o bin/darwin-arm64/app ./src/cmd/app

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries
          path: cli/bin/

  integration:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    needs: [preflight, test]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '${{ env.GO_VERSION }}'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@5b4374b04084dc1f9032b52464284b769ac5059e # v4
        with:
          version: 9

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd tests/projects/integration/health-test
          for dir in api worker; do
            cd $dir
            python -m pip install -r requirements.txt
            cd ..
          done

      - name: Install Python dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd tests/projects/integration/health-test
          foreach ($dir in @('api', 'worker')) {
            cd $dir
            python -m pip install -r requirements.txt
            cd ..
          }

      - name: Install Python dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd tests/projects/integration/health-test
          for dir in api worker; do
            cd $dir
            python -m pip install -r requirements.txt
            cd ..
          done

      - name: Install Node.js dependencies
        run: |
          cd tests/projects/integration/health-test
          for dir in web admin database; do
            cd $dir
            npm install
            cd ..
          done
        shell: bash

      - name: Build dashboard assets
        run: |
          cd dashboard
          pnpm install
          pnpm run build
          cd ..

      - name: Run port manager integration tests
        shell: bash
        timeout-minutes: 8
        run: |
          go test -v -tags=integration -timeout=6m ./src/internal/portmanager/...
        env:
          CI: true

      - name: Run E2E integration tests
        shell: bash
        timeout-minutes: 15
        run: |
          go test -v -tags=integration -timeout=10m ./src/cmd/app/commands -run TestHealthCommandE2E
        env:
          CI: true

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-test-logs-${{ matrix.os }}
          path: |
            cli/tests/projects/integration/health-test/*.log
            cli/.azure/**/*.log
          if-no-files-found: ignore

